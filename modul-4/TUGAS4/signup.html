<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - BzMe</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { background: #f8f8fc; color: #111827; font-family: sans-serif; }
    .card { background: #fff; border-radius: 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.09); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md card p-8">
    <div class="mb-6 text-center">
      <h1 class="text-3xl font-bold text-purple-600">Sign Up</h1>
      <p class="text-gray-500 mt-2">Isi data kamu untuk mendaftar layanan BzMe.</p>
    </div>

    <form id="signupForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Nama</label>
        <input type="text" id="sNama" placeholder="Nama lengkap" class="w-full border border-gray-300 rounded-lg px-4 py-3 mt-2 focus:border-purple-600 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="sEmail" placeholder="nama@contoh.com" class="w-full border border-gray-300 rounded-lg px-4 py-3 mt-2 focus:border-purple-600 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="sPassword" placeholder="Minimal 6 karakter" class="w-full border border-gray-300 rounded-lg px-4 py-3 mt-2 focus:border-purple-600 focus:outline-none">
      </div>

      <button type="submit" class="w-full bg-orange-400 text-white py-3 rounded-lg font-semibold hover:bg-orange-500 transition">Daftar</button>
    </form>

    <p class="text-sm text-gray-500 mt-6 text-center">
      Sudah punya akun? <a href="inddex3.html" class="text-purple-600 font-semibold">Kembali ke beranda</a>
    </p>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const nama = document.getElementById('sNama').value.trim();
      const email = document.getElementById('sEmail').value.trim();
      const pass = document.getElementById('sPassword').value;
      if (!nama || !email || !pass) {
        alert('Silakan isi semua data terlebih dahulu.');
        return;
      }
      if (!email.includes('@')) {
        alert('Email tidak valid.');
        return;
      }
      if (pass.length < 6) {
        alert('Password minimal 6 karakter.');
        return;
      }
      alert('Terima kasih, pendaftaran berhasil!');
      window.location.href = 'inddex3.html';
    });
  </script>
</body>
</html>
